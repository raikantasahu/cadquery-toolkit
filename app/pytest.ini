[pytest]
# Repo-local pytest config. Without this, pytest walks up and picks the stray
# ~/projects/pyproject.toml as its config (rootdir lands outside the repo).
# Keep the -sv default that file provided.
addopts = -sv

# cadquery / ezdxf still call pyparsing's deprecated camelCase grammar API
# (oneOf, setResultsName, parseString, setParseAction, infixNotation,
# delimitedList, ...) internally; pyparsing warns each time. None of these
# originate in our code (grep of app/ is clean) — they fire when cadquery
# imports its selector grammar and when a test builds an assembly. We can't fix
# a dependency's internals, so silence just these third-party
# DeprecationWarnings to keep the suite output readable. Warnings whose origin
# is our own modules (including "you used a deprecated cadquery API" notices,
# which carry our module as the origin) are NOT matched, so they still show.
filterwarnings =
    ignore::DeprecationWarning:cadquery
    ignore::DeprecationWarning:ezdxf
    ignore::DeprecationWarning:pyparsing
